<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appmin - Información de tu pago</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Appmin</h1>
        <h2>Información de tu pago</h2>
        <p>Por los mejores métodos de pago</p>
    </header>

    <main>
        <form action="exito.html" method="GET">
            <div>
                <label for="nombre">Nombre completo:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Nombre" required>
            </div>

            <div>
                <label for="conjunto">Conjunto Residencial:</label>
                <select id="conjunto" name="conjunto" required>
                    <option value="">Selecciona</option>
                    <option value="conjunto1">Conjunto 1</option>
                </select>
            </div>

            <div>
                <label for="telefono">Teléfono:</label>
                <input type="tel" id="telefono" name="telefono" placeholder="Número" required>
            </div>

            <div>
                <label for="correo">Correo:</label>
                <input type="email" id="correo" name="correo" placeholder="Correo electrónico" required>
            </div>

            <div>
                <label for="metodo">Método de Pago:</label>
                <select id="metodo" name="metodo" required>
                    <option value="">Selecciona</option>
                    <option value="pse">PSE</option>
                    <option value="tarjeta">Tarjeta de Crédito</option>
                </select>
            </div>

            <div>
                <input type="checkbox" id="robot" name="robot" required>
                <label for="robot">No soy un robot</label>
            </div>

            <p><a href="#">Lee nuestros términos y condiciones</a></p>

            <button type="submit">Proceder al Pago</button>
        </form>
    </main>

    <footer>
        <p>Tu Appmin</p>
    </footer>
</body>
</html>
